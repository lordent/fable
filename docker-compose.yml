services:
  db:
    image: postgres:17-alpine
    container_name: sql_builder_db
    restart: always
    environment:
      # Настройки для создания БД
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sql_builder
      # Настройки для работы psql внутри этого контейнера
      PGUSER: user
      PGPASSWORD: password
      PGDATABASE: sql_builder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: sql_builder
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/sql_builder
      - PYTHONUNBUFFERED=1
      # Эти переменные позволят запускать psql из контейнера с кодом
      - PGHOST=db
      - PGUSER=user
      - PGPASSWORD=password
      - PGDATABASE=sql_builder
      # Прокси для обхода 403 при сборке
      - http_proxy=${HTTP_PROXY}
      - https_proxy=${HTTPS_PROXY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
